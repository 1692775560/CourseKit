<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourseKit 课程报名管理器</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">CourseKit</p>
          <h1>课程报名管理器</h1>
        </div>
        <p class="header-copy">查看课程招生状态，筛选当前列表，并导出给运营团队。</p>
      </header>

      <section class="toolbar" aria-label="课程筛选和导出">
        <div class="filter-group">
          <label for="status-filter">课程状态</label>
          <select id="status-filter" name="status-filter">
            <option value="all">全部</option>
            <option value="open">招生中</option>
            <option value="full">已满</option>
            <option value="closed">已关闭</option>
          </select>
        </div>

        <output id="result-count" class="result-count" aria-live="polite"></output>

        <button id="export-button" class="export-button" type="button">
          导出 CSV
        </button>
      </section>

      <section class="table-shell" aria-labelledby="course-table-title">
        <div class="table-title-row">
          <h2 id="course-table-title">课程列表</h2>
          <span id="updated-at" class="updated-at"></span>
        </div>

        <div id="empty-state" class="empty-state" hidden>
          当前状态下没有课程。请选择其他状态，或稍后再查看。
        </div>

        <table id="course-table">
          <thead>
            <tr>
              <th scope="col">课程名称</th>
              <th scope="col">负责人</th>
              <th scope="col">报名人数</th>
              <th scope="col">容量</th>
              <th scope="col">状态</th>
            </tr>
          </thead>
          <tbody id="course-table-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
